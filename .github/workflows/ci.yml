name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    # Lint against latest Python only (speed); compatibility validated in test matrix below.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python setup (dev)
        uses: ./.github/actions/python-setup
        with:
          python-version: '3.13'
          install-extras: 'dev'
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Verify Quarto installation
        run: quarto check
      - name: Ruff lint
        run: ruff check .
      - name: Black format check
        run: pre-commit run black --all-files

  contracts:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python setup (dev)
        uses: ./.github/actions/python-setup
        with:
          python-version: '3.13'
          install-extras: 'dev'
      - name: Run decomposition contract suite
        run: |
          pytest -q \
            tests/test_core_protocols.py \
            tests/test_nhanes_adapters.py \
            tests/test_nhanes_reporting_adapters.py \
            tests/test_nhanes_data_access.py \
            tests/test_nhanes_transforms_regression.py \
            tests/test_nhanes_manifest_service.py \
            tests/test_nhanes_analysis_service.py \
            --cov=pophealth_observatory.core \
            --cov=pophealth_observatory.nhanes_data_access \
            --cov=pophealth_observatory.nhanes_transforms \
            --cov=pophealth_observatory.nhanes_manifest_service \
            --cov=pophealth_observatory.nhanes_analysis_service \
            --cov-fail-under=80 \
            --cov-report=xml:coverage-contracts.xml \
            --cov-report=term-missing
      - name: Upload decomposition coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-contracts
          path: coverage-contracts.xml

  test:
    runs-on: ubuntu-latest
    needs: [lint, contracts]
    strategy:
      matrix:
        # Explicit compatibility targets (project uses modern typing; primary support >=3.11)
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-
      - name: Python setup (dev)
        uses: ./.github/actions/python-setup
        with:
          python-version: ${{ matrix.python-version }}
          install-extras: 'dev'
      - name: Run tests
        run: |
          pytest -q
          coverage run -m pytest
          coverage xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
